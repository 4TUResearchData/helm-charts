apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "djehuty.fullname" . }}
  labels: {{- include "djehuty.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # /data PVC is ReadWriteOnce; can't roll while old pod holds it.
  selector:
    matchLabels: {{- include "djehuty.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "djehuty.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include "djehuty.configJson" . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: djehuty
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          # Mirrors docker/dev-entrypoint.sh: touch the marker BEFORE running
          # djehuty (it never exits after --initialize, it continues into the
          # web server), so the next restart skips --initialize.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              INIT=""
              {{- if .Values.initialize }}
              MARKER=/data/.initialized
              if [ ! -f "$MARKER" ]; then
                INIT="--initialize"
                touch "$MARKER"
              fi
              {{- end }}
              exec /usr/bin/djehuty web $INIT --config-file /etc/djehuty/config.json
          env:
            {{- range $k, $_ := .Values.secrets.env }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "djehuty.secretName" $ }}
                  key: {{ $k }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          # Synthetic X-Forwarded-For on probe requests: kubelet hits the pod
          # directly, bypassing whatever Router/Ingress would normally inject
          # the header. djehuty.web.wsgi logs ERROR on every probe when
          # config.use-x-forwarded-for is on; the synthetic 127.0.0.1 silences
          # that and is harmless when use-x-forwarded-for is off.
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: X-Forwarded-For
                  value: 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: X-Forwarded-For
                  value: 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/djehuty/config.json
              subPath: config.json
            - name: secret-files
              mountPath: /etc/djehuty/secrets
              readOnly: true
            - name: data
              mountPath: /data
            {{- /* Side-loaded config fragments (config.includes[]). One mount per
                   reference, under /etc/djehuty/config.d/<refName>/. djehuty's
                   loader walks `include:` entries in the rendered config.json. */}}
            {{- range $idx, $inc := default (list) .Values.config.includes }}
            - name: {{ printf "config-include-%d" $idx }}
              mountPath: /etc/djehuty/config.d/{{ default $inc.secret $inc.configMap }}
              readOnly: true
            {{- end }}
      {{- if .Values.virtuoso.enabled }}
      initContainers:
        - name: wait-for-virtuoso
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z {{ include "djehuty.virtuoso.fullname" . }} {{ default 8890 (dig "service" "port" 8890 .Values.virtuoso) }}; do echo waiting for virtuoso; sleep 2; done"
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "djehuty.fullname" . }}-config
        - name: secret-files
          secret:
            secretName: {{ include "djehuty.secretName" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "djehuty.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- range $idx, $inc := default (list) .Values.config.includes }}
        - name: {{ printf "config-include-%d" $idx }}
          {{- if $inc.configMap }}
          configMap:
            name: {{ $inc.configMap }}
            items:
              {{- range $k := $inc.keys }}
              - key: {{ $k | quote }}
                path: {{ $k | quote }}
              {{- end }}
          {{- else }}
          secret:
            secretName: {{ $inc.secret }}
            items:
              {{- range $k := $inc.keys }}
              - key: {{ $k | quote }}
                path: {{ $k | quote }}
              {{- end }}
          {{- end }}
        {{- end }}
