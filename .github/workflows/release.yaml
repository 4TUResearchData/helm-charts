name: release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.2

      # Register this repo's own published index so charts with
      # cross-chart dependencies (djehuty → virtuoso) can resolve at
      # package time. `|| true` covers the bootstrap window before
      # virtuoso first lands on gh-pages.
      - name: Add 4TU.ResearchData chart repo
        run: |
          helm repo add 4turesearchdata https://4turesearchdata.github.io/helm-charts || true
          helm repo update || true

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
