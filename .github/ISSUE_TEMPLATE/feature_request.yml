name: Feature request
description: Suggest a new feature or improvement to a chart
labels: [enhancement]
body:
  - type: dropdown
    id: chart
    attributes:
      label: Chart
      options:
        - djehuty
        - virtuoso
        - other / repo-wide
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the chart doesn't currently let you do cleanly?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
